services:
  vibe-trading:
    build: .
    ports:
      - "127.0.0.1:8899:8899"
    env_file:
      - agent/.env
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
    restart: unless-stopped

  live-trading:
    build: .
    user: root
    env_file:
      - agent/.env
    environment:
      - NO_PROXY=localhost,127.0.0.1
      - HOME=/home/vibe
    volumes:
      - live-trading-data:/home/vibe/.vibe-trading
    command: ["python", "extensions/run_live_trading.py", "--live", "--confirm-live", "I_UNDERSTAND", "--balance", "50", "--interval", "5", "--position-size", "0.2"]
    restart: unless-stopped
    healthcheck:
      disable: true

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started

volumes:
  vibe-runs:
  vibe-sessions:
  live-trading-data:
